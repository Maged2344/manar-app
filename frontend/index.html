<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manar App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>Manar App</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="#" id="loginBtn">Login</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Welcome to Manar App</h1>
            <p>Your modern web application platform</p>
            <button class="btn-primary" id="getStartedBtn">Get Started</button>
        </div>
    </main>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary" id="authSubmitBtn">Login</button>
                <p class="toggle-auth">Don't have an account? <a href="#" id="toggleAuth">Register</a></p>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Manar App. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
