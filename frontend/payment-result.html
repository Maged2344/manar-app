<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result - Manar Media</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .result-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gray-50);padding:2rem;}
        .result-card{background:var(--white);border-radius:var(--radius);padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--gray-200);}
        .result-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.2rem;}
        .result-icon.success{background:#d1fae5;color:#059669;}
        .result-icon.fail{background:#fee2e2;color:#dc2626;}
        .result-card h1{font-size:1.6rem;font-weight:800;color:var(--dark);margin-bottom:0.6rem;}
        .result-card p{font-size:0.95rem;color:var(--gray-500);line-height:1.7;margin-bottom:1.8rem;}
        .result-actions{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;}
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="/" class="logo"><span class="logo-icon">&#9670;</span> Manar <span class="logo-accent">Media</span></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/pricing.html">Pricing</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li class="auth-nav"><a href="#" id="loginBtn" class="btn btn-outline btn-sm">Sign In</a></li>
            </ul>
        </div>
    </nav>

    <div class="result-page">
        <div class="result-card" id="resultCard">
            <!-- filled by JS -->
        </div>
    </div>

    <script>
    const params  = new URLSearchParams(window.location.search);
    const success = params.get('success') === '1';
    const card    = document.getElementById('resultCard');

    if (success) {
        card.innerHTML = `
            <div class="result-icon success"><i class="fas fa-check"></i></div>
            <h1>Payment Successful!</h1>
            <p>Thank you for choosing Manar Media. Your payment has been confirmed and our team will contact you within 24 hours to kick off your project.</p>
            <div class="result-actions">
                <a href="/portal.html" class="btn btn-primary"><i class="fas fa-user"></i>&nbsp; My Account</a>
                <a href="/" class="btn btn-secondary">Back to Home</a>
            </div>
        `;
        document.title = 'Payment Confirmed - Manar Media';
    } else {
        card.innerHTML = `
            <div class="result-icon fail"><i class="fas fa-times"></i></div>
            <h1>Payment Not Completed</h1>
            <p>Your payment was not completed. No charges were made to your account. Please try again or contact us for assistance.</p>
            <div class="result-actions">
                <a href="/pricing.html" class="btn btn-primary">Try Again</a>
                <a href="/contact.html" class="btn btn-secondary">Contact Us</a>
            </div>
        `;
        document.title = 'Payment Failed - Manar Media';
    }
    </script>
    <script src="script.js"></script>
</body>
</html>
