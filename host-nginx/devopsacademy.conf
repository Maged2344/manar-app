# DevopsAcademy - Host Nginx Config
# File: /etc/nginx/sites-available/devopsacademy
# Symlink: sudo ln -s /etc/nginx/sites-available/devopsacademy /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name devopsacademy.cloud-stacks.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name devopsacademy.cloud-stacks.com;

    ssl_certificate /etc/letsencrypt/live/devopsacademy.cloud-stacks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devopsacademy.cloud-stacks.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
